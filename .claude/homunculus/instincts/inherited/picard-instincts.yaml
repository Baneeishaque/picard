# Picard Workflow Update Translation Files Via Weblate

## Action

Follow the update-translation-files-via-weblate workflow:
1. Edit or add translations on Weblate platform.
2. Pull updated .po files from Weblate.
3. Commit changes to the relevant po/*.po or po/constants/*.po files with a message referencing Weblate and translation progress.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~5x per month
- Files: po/*.po, po/appstream/*.po, po/constants/*.po

